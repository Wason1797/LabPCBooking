services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: booking
      POSTGRES_PASSWORD: booking
      POSTGRES_DB: booking
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://booking:booking@db:5432/booking
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  ui:
    build:
      context: ./ui
      args:
        - VITE_API_URL=${VITE_API_URL}
    ports:
      - "8080:80"
    env_file:
      - ./.env

volumes:
  db_data:
